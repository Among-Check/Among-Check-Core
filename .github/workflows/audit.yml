name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  among-check-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Run Among-Check scan
        run: pnpm among-check scan --repo .
        continue-on-error: true
        env:
          AMONG_CHECK_AUDIT_COMMIT: 'true'

      - name: Commit TOON audit archive
        run: |
          git config user.name "among-check[bot]"
          git config user.email "among-check[bot]@users.noreply.github.com"
          git add audits/
          git diff --staged --quiet || git commit -m "chore(security): among-check audit $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        continue-on-error: true

      - name: Push audit commit
        if: github.event_name == 'push'
        run: git push
        continue-on-error: true
