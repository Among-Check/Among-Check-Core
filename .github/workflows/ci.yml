name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true
        # Lockfile may not exist until Phase 0 scaffold lands

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
        continue-on-error: true

      - name: Test
        run: pnpm test
        continue-on-error: true

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify agent docs exist
        run: |
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f docs/architecture.md
          test -f docs/scanner-catalog.md
          test -f docs/audit-archive.md
          test -f audits/latest.toon
          test -f .cursor/rules/project-core.mdc
